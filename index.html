    <!-- Open Graph -->
    <meta property="og:title" content="Nihao Pharmaceuticals® | Premium Nutraceutical Solutions" />

  <body>
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; font-size: 16px;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-log').textContent += '\n[' + e.filename + ':' + e.lineno + '] ' + e.message;
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-log').textContent += '\nUnhandled Promise: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
